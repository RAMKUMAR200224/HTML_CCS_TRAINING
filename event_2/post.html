<!DOCTYPE html>
  <html lang="en">
  <head>
    <center>
    <h2>Feedback</h2>

            <a href="index.html">home</a>|
            <a href="login.html">login</a>|
            <a href="post.html">post login</a>
        </nav>

  <body bgcolor="#F0F8FF">
    <hr>
    <center>
    <h2><font color="#8B0000">Post-Event Feedback</font></h2>

    <form action="#" method="post">

        <label>Your Name:</label><br>
        <input type="text" name="review_name"><br><br>

        <label>Rate the Event:</label><br>
        <input type="radio" name="rating" value="Excellent"> Excellent
        <input type="radio" name="rating" value="Good"> Good
        <input type="radio" name="rating" value="Average"> Average
        <input type="radio" name="rating" value="Poor"> Poor
        <br><br>

        <label>Favorite Part of the Event:</label><br>
        <select name="favorite_part">
            <option value="workshops">Workshops</option>
            <option value="keynotes">Keynote Sessions</option>
            <option value="networking">Networking</option>
            <option value="exhibition">Exhibition Booths</option>
        </select>
        <br><br>

        <label>Additional Comments:</label><br>
        <textarea name="comments" rows="5" cols="50"></textarea><br><br>

        <input type="submit" value="Submit Review">
        <input type="reset" value="Reset">

    </form>
    </center>

    <hr>
  </body>
  </html>
