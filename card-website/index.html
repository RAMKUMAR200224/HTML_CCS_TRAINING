<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>ramkumar</h1>
        <nav>
            <a href="#profile1">GROW</a> 
            <a href="#profile2">GIVE</a> 
            <a href="#profile3">EARN</a>
        </nav>
    </header>

    <main>
        <article id="profile1" class="card">
            <figure>
                <img src="ram 2.jpg" alt="ram" width="500" height="500">
            <figcaption>Ram</figcaption>
            </figure>
            <p>Lets grow money</p>
        </article>
        <article id="profile2" class="card">
            <figure>
                <img src="ajith2.png" alt="ajith" width="500" height="500">
            <figcaption>ajith</figcaption>
            </figure>
            <p>Lets give money</p>
        </article>
        <article id="profile3" class="card">
            <figure>
                <img src="roman.jpg" alt="roman" width="500" height="500">
            <figcaption>Roman<span class="nowrap">Dev Rel</span></figcaption>
            </figure>
            <p>Lets earn money</p>
        </article>
    </main>
    <footer>
        <p>&copy; ultimate star</p>
    </footer>
</body>
</html>
